<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🍳 Recipe Finder</title>
    <link rel="stylesheet" href="recipefinderstyle.css" />
</head>
<body>
    <div class="container">
        <h1>🍳 Recipe Finder</h1>
        <p class="subtitle">Search any dish — get instant recipes!</p>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="e.g. pizza, pasta, biryani..." />
            <button id="searchBtn">🔍 Search</button>
        </div>

        <div id="results" class="results"></div>
    </div>

    <!-- Recipe Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="recipefinderscript.js"></script>
</body>
</html>
